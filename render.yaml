services:
  - type: web
    name: tarify-online
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: "cd frontend && npm install && npm run build && cd ../backend && npm install"
    startCommand: "cd backend && node server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_PATH
        value: /opt/render/project/src/backend/data/tarify.db
    disk:
      name: tarify-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1
